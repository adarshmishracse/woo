<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
  <div class="bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500
">
          <nav class="text-[#fff]  max-w-[1200px] mx-auto 
        flex justify-between h-[72px] items-center xl:px-0 px-7  ">
          
          <div>
            <img src="woocommerce.png" alt=""
            width="65px" height="65px"
            class="rounded-full">
          </div>
          
          <div class="hidden xl:flex flex-col-2 gap-5 font-ggSans  font-[16px]">
            <a href="#" class="capitalize hover:underline">Home</a>
            <a href="#" class="capitalize hover:underline">About Us</a>
            
            <a href="#" class="capitalize hover:underline">discover</a>
            <a href="#" class="capitalize hover:underline">Crm</a>
            
            <a href="#" class="capitalize hover:underline">support</a>
            <a href="#" class="capitalize hover:underline">blog</a>
            
            <a href="#" class="capitalize hover:underline">careers</a>
          </div>
         
          <div class="hidden xl:flex">
            <a href="chstbot.html">
              <button class="bg-[#fff] px-4 self-center p-2 text-[#2c2f33] 
              rounded-full font-[500] text-[14px]">
                Chat Bot
              </button>
            </a>
          </div>
    
          <div class="xl:hidden block">
            <i class="fa-solid fa-bars text-[23px]"></i>
          </div>
        </nav>

        </div>
<div class="flex items-center justify-center min-h-screen 
    border border-gray-300  bg-no-repeat bg-center">
  <div class="w-full max-w-md p-8 space-y-6  rounded-2xl shadow-lg ">
    <h2 class="text-2xl font-bold text-center text-gray-800"><img src="—Pngtree—avatar icon profile icon member_5247852.png" alt="" width="32px" class="mx-auto mx-10px"></h2>
    
    <form action="#" method="POST" class="space-y-5">
    
      <div>
        <label for="email" class="block mb-1 text-sm font-medium text-gray-600">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required
          class="w-full px-4 py-2 text-gray-700 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="Enter your email"
        />
      </div>
      

      <div>
        <label for="password" class="block mb-1 text-sm font-medium text-gray-600">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required
          class="w-full px-4 py-2 text-gray-700 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="Enter your password"
        />
      </div>
     
      <div class="flex items-center justify-between">
        <label class="flex items-center">
          <input type="checkbox" class="w-4 h-4 text-blue-500 border-gray-300 rounded focus:ring-blue-500">
          <span class="ml-2 text-sm text-gray-600">Remember me</span>
        </label>
        <a href="#" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
      </div>
      
   
      <button 
        type="submit" 
        class="w-full px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        Login
      </button>
    </form>
    
   
    <p class="text-sm text-center text-gray-600">
      Don’t have an account? 
      <a href="#" class="text-blue-600 hover:underline">Sign up</a>
    </p>
  </div>
</div>
</body>
</html>
